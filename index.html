<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Tock Days 2026</title>
<style>
  :root {
    --teal:       #1D9E75;
    --teal-dark:  #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid:   #5DCAA5;
    --gray-bg:    #F7F7F5;
    --gray-card:  #FFFFFF;
    --gray-border:#E2E0D8;
    --gray-text:  #444441;
    --gray-muted: #888780;
    --blue-light: #E6F1FB;
    --blue-text:  #185FA5;
    --amber-bg:   #FAEEDA;
    --amber-text: #633806;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--gray-text); min-height: 100vh; }

  /* HEADER */
  .site-header { background: var(--teal-dark); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; }
  .site-header h1 { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: .01em; }
  .site-header .badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
  .site-header .dates { color: rgba(255,255,255,0.65); font-size: 12px; margin-left: auto; }

  /* LAYOUT */
  .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }

  /* SEARCH SECTION */
  .search-card { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 14px; padding: 20px 24px; margin-bottom: 20px; }
  .search-card h2 { font-size: 13px; font-weight: 600; color: var(--gray-muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 14px; }
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-row input { flex: 1; min-width: 220px; height: 42px; border: 1px solid var(--gray-border); border-radius: 8px; padding: 0 14px; font-size: 14px; background: var(--gray-bg); color: var(--gray-text); outline: none; transition: border .15s; }
  .search-row input:focus { border-color: var(--teal); background: #fff; }
  .search-row select { height: 42px; border: 1px solid var(--gray-border); border-radius: 8px; padding: 0 12px; font-size: 13px; background: var(--gray-bg); color: var(--gray-text); cursor: pointer; outline: none; }
  .search-row select:focus { border-color: var(--teal); }
  .result-count { font-size: 12px; color: var(--gray-muted); margin-left: auto; }

  /* RESULTS GRID */
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .prod-card { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .prod-card:hover { border-color: var(--teal-mid); box-shadow: 0 2px 12px rgba(29,158,117,.10); }
  .prod-card.active { border-color: var(--teal); border-width: 2px; }
  .prod-card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .cat-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; margin-top: 2px; }
  .cat-cerradura { background: var(--blue-light); color: var(--blue-text); }
  .cat-accesorio  { background: #F1EFE8; color: #5F5E5A; }
  .prod-name { font-size: 15px; font-weight: 600; color: var(--gray-text); line-height: 1.3; }
  .prod-nivel { font-size: 11px; color: var(--teal-dark); font-weight: 500; margin-top: 2px; }
  .precio-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--gray-border); }
  .precio-row:last-child { border-bottom: none; }
  .precio-label { font-size: 12px; color: var(--gray-muted); }
  .precio-val { font-size: 13px; font-weight: 500; }
  .precio-val.tachado { text-decoration: line-through; color: var(--gray-muted); font-weight: 400; font-size: 12px; }
  .precio-val.tock { color: var(--teal-dark); font-size: 15px; }
  .disc-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .d10{background:#EAF3DE;color:#3B6D11} .d15{background:#E1F5EE;color:#0F6E56}
  .d20{background:#B5D4F4;color:#0C447C} .d30{background:#EEEDFE;color:#3C3489}
  .d35{background:#FAC775;color:#633806} .d40{background:#F5C4B3;color:#712B13}
  .ins-divider { border-top: 1px dashed var(--gray-border); margin: 10px 0 8px; }
  .ins-label { font-size: 11px; font-weight: 600; color: var(--gray-muted); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; }

  /* TOTAL CARD */
  .total-box { background: var(--teal-light); border: 1px solid var(--teal-mid); border-radius: 10px; padding: 14px 16px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .total-box .total-label { font-size: 12px; font-weight: 600; color: var(--teal-dark); }
  .total-box .total-ahorro { font-size: 11px; color: var(--teal); margin-top: 2px; }
  .total-box .total-price { font-size: 22px; font-weight: 700; color: var(--teal-dark); }

  /* EMPTY / NO RESULTS */
  .empty { text-align: center; padding: 48px 16px; color: var(--gray-muted); }
  .empty svg { display: block; margin: 0 auto 12px; opacity: .4; }
  .empty p { font-size: 14px; }

  /* NIVELES REFERENCE */
  .ref-section { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 14px; padding: 20px 24px; }
  .ref-section h2 { font-size: 13px; font-weight: 600; color: var(--gray-muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 14px; }
  .niveles-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .nivel-card { border: 1px solid var(--gray-border); border-radius: 10px; padding: 14px 12px; text-align: center; }
  .nivel-name { font-size: 15px; font-weight: 700; color: var(--teal-dark); margin-bottom: 4px; }
  .nivel-regular { font-size: 11px; color: var(--gray-muted); text-decoration: line-through; }
  .nivel-promo { font-size: 18px; font-weight: 700; color: var(--teal); }
  .nivel-save { font-size: 10px; background: var(--teal-light); color: var(--teal-dark); border-radius: 20px; padding: 2px 8px; display: inline-block; margin-top: 4px; font-weight: 600; }
  .nivel-desc { font-size: 11px; color: var(--gray-muted); margin-top: 6px; }

  /* FOOTER */
  .site-footer { text-align: center; padding: 20px; font-size: 11px; color: var(--gray-muted); border-top: 1px solid var(--gray-border); margin-top: 32px; }

  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .niveles-grid { grid-template-columns: repeat(3, 1fr); }
    .search-row input { min-width: 100%; }
    .total-box .total-price { font-size: 18px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Cotizador Tock Days 2026</h1>
  <span class="badge">TOCK DAYS</span>
  <span class="dates">21 Mayo – 02 Junio 2026</span>
</header>

<div class="main">

  <!-- BUSCADOR -->
  <div class="search-card">
    <h2>Buscar producto</h2>
    <div class="search-row">
      <input type="text" id="buscar" placeholder="Escribe el nombre del modelo..." oninput="render()">
      <select id="fcat" onchange="render()">
        <option value="">Todas las categorías</option>
        <option value="Cerradura inteligente">Cerraduras</option>
        <option value="Accesorio">Accesorios</option>
      </select>
      <select id="fniv" onchange="render()">
        <option value="">Todos los niveles</option>
        <option value="N1">N1</option>
        <option value="N2">N2</option>
        <option value="N3">N3</option>
        <option value="N4">N4</option>
        <option value="N5">N5</option>
        <option value="Sin Instalación">Sin instalación</option>
      </select>
      <span class="result-count" id="result-count">49 productos</span>
    </div>
  </div>

  <!-- GRID DE PRODUCTOS -->
  <div class="results-grid" id="grid"></div>

  <!-- REFERENCIA NIVELES -->
  <div class="ref-section">
    <h2>Niveles de instalación — 20% descuento Tock Days</h2>
    <div class="niveles-grid" id="niveles-ref"></div>
  </div>

</div>

<footer class="site-footer">
  Precios válidos del 21 de Mayo al 02 de Junio 2026 &nbsp;·&nbsp; *Precios no incluyen IVA &nbsp;·&nbsp; Uso exclusivo asesores
</footer>

<script>
const NIVELES = {
  "N1": { regular: 890,  desc: "Instalación básica" },
  "N2": { regular: 1390, desc: "Instalación estándar" },
  "N3": { regular: 1890, desc: "Instalación avanzada" },
  "N4": { regular: 500,  desc: "Instalación express" },
  "N5": { regular: 300,  desc: "Instalación mínima" },
};

const PRODUCTOS = [
  {cat:"Cerradura inteligente",mod:"TLX01",reg:3699,desc:20,tok:2959,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX01 Huella",reg:3699,desc:30,tok:2589,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX02 TL",reg:3899,desc:20,tok:3119,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX02 TS (20%)",reg:3899,desc:20,tok:3119,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX02 TS (30%)",reg:3899,desc:30,tok:2729,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX20 TL / TS",reg:3299,desc:20,tok:2639,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TOCK100 TS (35%)",reg:3999,desc:35,tok:2599,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TOCK100 TS (40%)",reg:3999,desc:40,tok:2399,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TOCK100 TL",reg:3999,desc:35,tok:2599,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX09 TL",reg:5499,desc:20,tok:4399,niv:"N2"},
  {cat:"Cerradura inteligente",mod:"TLX20 Plus",reg:3999,desc:20,tok:3199,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX02 Plus TL",reg:4599,desc:20,tok:3679,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX02 Plus TS (20%)",reg:4599,desc:20,tok:3679,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX02 Plus TS (30%)",reg:4599,desc:30,tok:3219,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TOCK100 Plus TS (40%)",reg:4999,desc:40,tok:2999,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TOCK100 Plus TL (40%)",reg:4999,desc:40,tok:2999,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TOCK100 Plus TL (20%)",reg:4999,desc:20,tok:3999,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"XS TL",reg:6499,desc:20,tok:5199,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"XS Face TL",reg:7999,desc:20,tok:6399,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX07",reg:5399,desc:20,tok:4319,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX07 Twin",reg:6499,desc:20,tok:5199,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"Tock Lite",reg:1899,desc:15,tok:1614,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"TOCK250X TL",reg:3499,desc:20,tok:2799,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"TOCK250X TS",reg:3499,desc:30,tok:2449,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"Tock Bolt",reg:2499,desc:20,tok:1999,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"TLX11",reg:2499,desc:20,tok:1999,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"TLX03",reg:3699,desc:20,tok:2959,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"Tock S",reg:2499,desc:20,tok:1999,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"Tock C",reg:3599,desc:20,tok:2879,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"Tock R1",reg:2899,desc:20,tok:2319,niv:"N1"},
  {cat:"Cerradura inteligente",mod:"TLX06",reg:3699,desc:20,tok:2959,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX06 Plus",reg:6499,desc:20,tok:5199,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"Tock XT",reg:3699,desc:20,tok:2959,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"Tock XT Twin",reg:5999,desc:20,tok:4799,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"Tock Box X",reg:2999,desc:20,tok:2399,niv:"N4"},
  {cat:"Cerradura inteligente",mod:"Tock Fortek",reg:3999,desc:20,tok:3199,niv:"Sin Instalación"},
  {cat:"Cerradura inteligente",mod:"TLX20 Plus Puerta Seg.",reg:4499,desc:20,tok:3599,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"TLX02 Plus Puerta Seg.",reg:5099,desc:20,tok:4079,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"XS Puerta Seguridad",reg:6999,desc:20,tok:5599,niv:"N3"},
  {cat:"Cerradura inteligente",mod:"XS Face Puerta Seg.",reg:8499,desc:20,tok:6799,niv:"N3"},
  {cat:"Accesorio",mod:"Gateway G2",reg:1199,desc:10,tok:1079,niv:"N5"},
  {cat:"Accesorio",mod:"Gateway G3",reg:1199,desc:10,tok:1079,niv:"N5"},
  {cat:"Accesorio",mod:"Gateway G5",reg:1199,desc:10,tok:1079,niv:"N5"},
  {cat:"Accesorio",mod:"Sensor de Cierre TL",reg:599,desc:15,tok:509,niv:"Sin Instalación"},
  {cat:"Accesorio",mod:"Control BT - TL",reg:799,desc:15,tok:679,niv:"Sin Instalación"},
  {cat:"Accesorio",mod:"Tarjetas RFID (10 pack)",reg:500,desc:15,tok:425,niv:"Sin Instalación"},
  {cat:"Accesorio",mod:"Tarjetas RFID (5 pack)",reg:300,desc:15,tok:255,niv:"Sin Instalación"},
  {cat:"Accesorio",mod:"Pulseras RFID (5 pack)",reg:449,desc:15,tok:381,niv:"Sin Instalación"},
  {cat:"Accesorio",mod:"Pulseras RFID (10 pack)",reg:849,desc:15,tok:721,niv:"Sin Instalación"},
];

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-MX');
}
function pillClass(d) {
  return 'd' + d;
}

function buildCard(p) {
  const niv = NIVELES[p.niv];
  const insReg = niv ? niv.regular : 0;
  const insPromo = niv ? Math.round(insReg * 0.80) : 0;
  const insSave = insReg - insPromo;
  const total = p.tok + insPromo;
  const ahorroTotal = (p.reg - p.tok) + insSave;
  const tieneIns = niv && insReg > 0;
  const catClass = p.cat === 'Accesorio' ? 'cat-accesorio' : 'cat-cerradura';
  const catLabel = p.cat === 'Accesorio' ? 'Accesorio' : 'Cerradura';

  let insHTML = '';
  if (tieneIns) {
    insHTML = `
      <div class="ins-divider"></div>
      <div class="ins-label">Instalación ${p.niv}</div>
      <div class="precio-row">
        <span class="precio-label">Precio regular instalación</span>
        <span class="precio-val tachado">${fmt(insReg)}</span>
      </div>
      <div class="precio-row">
        <span class="precio-label">Instalación Tock Days <span class="disc-pill d20">−20%</span></span>
        <span class="precio-val tock">${fmt(insPromo)}</span>
      </div>
      <div class="precio-row">
        <span class="precio-label">Ahorro en instalación</span>
        <span class="precio-val" style="color:var(--teal)">${fmt(insSave)}</span>
      </div>`;
  } else {
    insHTML = `
      <div class="ins-divider"></div>
      <div class="ins-label" style="color:var(--gray-muted)">Sin instalación incluida</div>`;
  }

  const totalHTML = `
    <div class="total-box">
      <div>
        <div class="total-label">${tieneIns ? 'Total equipo + instalación' : 'Total equipo'}</div>
        <div class="total-ahorro">Ahorro total ${fmt(ahorroTotal)}</div>
      </div>
      <div class="total-price">${fmt(tieneIns ? total : p.tok)}</div>
    </div>`;

  return `
    <div class="prod-card" onclick="this.classList.toggle('active')">
      <div class="prod-card-head">
        <div>
          <div class="prod-name">${p.mod}</div>
          <div class="prod-nivel">${tieneIns ? p.niv + ' — ' + niv.desc : 'Sin instalación'}</div>
        </div>
        <span class="cat-badge ${catClass}">${catLabel}</span>
      </div>
      <div class="precio-row">
        <span class="precio-label">Precio regular</span>
        <span class="precio-val tachado">${fmt(p.reg)}</span>
      </div>
      <div class="precio-row">
        <span class="precio-label">Precio Tock Days <span class="disc-pill ${pillClass(p.desc)}">−${p.desc}%</span></span>
        <span class="precio-val tock">${fmt(p.tok)}</span>
      </div>
      <div class="precio-row">
        <span class="precio-label">Ahorro en equipo</span>
        <span class="precio-val" style="color:var(--teal)">${fmt(p.reg - p.tok)}</span>
      </div>
      ${insHTML}
      ${totalHTML}
    </div>`;
}

function render() {
  const q = document.getElementById('buscar').value.toLowerCase().trim();
  const cat = document.getElementById('fcat').value;
  const niv = document.getElementById('fniv').value;

  const filtered = PRODUCTOS.filter(p => {
    if (q && !p.mod.toLowerCase().includes(q)) return false;
    if (cat && p.cat !== cat) return false;
    if (niv && p.niv !== niv) return false;
    return true;
  });

  document.getElementById('result-count').textContent = filtered.length + ' producto' + (filtered.length !== 1 ? 's' : '');

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/></svg>
      <p>No se encontraron productos con ese criterio.</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(buildCard).join('');
}

function renderNivelesRef() {
  const container = document.getElementById('niveles-ref');
  container.innerHTML = Object.entries(NIVELES).map(([key, n]) => {
    const promo = Math.round(n.regular * 0.80);
    const save = n.regular - promo;
    return `<div class="nivel-card">
      <div class="nivel-name">${key}</div>
      <div class="nivel-desc">${n.desc}</div>
      <div class="nivel-regular">${fmt(n.regular)}</div>
      <div class="nivel-promo">${fmt(promo)}</div>
      <div class="nivel-save">Ahorra ${fmt(save)}</div>
    </div>`;
  }).join('');
}

renderNivelesRef();
render();
</script>
</body>
</html>
